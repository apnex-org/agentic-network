# cloudbuild.yaml — Hub + nginx-proxy image CD
# mission-86 M-Hub-Storage-Cloud-Deploy, Design §4.12
#
# Run by the deploy/hub/ Cloud Build trigger (deploy/hub/cloudbuild.tf) on
# apnex-org/agentic-network main-merge. Builds + pushes both container
# images to Artifact Registry; Watchtower on the Hub VM then auto-pulls the
# hub image within its 5-minute poll cycle.
#
# The _REGISTRY substitution is supplied by the trigger
# (region-docker.pkg.dev/project/repo); the default below matches the
# prod env so a manual `gcloud builds submit --config cloudbuild.yaml`
# also resolves. COMMIT_SHA is populated in trigger-driven builds.

substitutions:
  _REGISTRY: australia-southeast1-docker.pkg.dev/labops-389703/cloud-run-source-deploy

steps:
  # 1. Stage sovereign packages into hub/ as tarballs — the Hub depends on
  #    them via file:../packages/* refs that don't survive the Docker build
  #    context. Mirrors scripts/local/build-hub.sh; no cleanup trap here
  #    (the Cloud Build workspace is ephemeral).
  - id: stage-sovereign-packages
    name: node:22
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        source scripts/build/lib/transient-package-swap.sh
        swap_workspace_deps_to_tarballs hub \
          "@apnex/storage-provider:packages/storage-provider" \
          "@apnex/repo-event-bridge:packages/repo-event-bridge"

  # 2. Build the Hub image (:latest for Watchtower + :COMMIT_SHA for
  #    traceability per OQ-10).
  - id: build-hub
    name: gcr.io/cloud-builders/docker
    args: ['build',
           '-t', '${_REGISTRY}/hub:latest',
           '-t', '${_REGISTRY}/hub:$COMMIT_SHA',
           'hub']

  # 3. Build the nginx ingress-proxy image.
  - id: build-proxy
    name: gcr.io/cloud-builders/docker
    args: ['build',
           '-t', '${_REGISTRY}/hub-proxy:latest',
           'deploy/hub/proxy']

images:
  - '${_REGISTRY}/hub:latest'
  - '${_REGISTRY}/hub:$COMMIT_SHA'
  - '${_REGISTRY}/hub-proxy:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
