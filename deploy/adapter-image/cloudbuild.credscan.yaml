# P1a cred-free image-layer scan (pillar-2 acceptance; scion-avoid[10]).
# Exports the built image's filesystem and greps for baked secret paths. Runs on
# Cloud Build (modern docker; the local box's old docker core-dumps running node
# images). Submit: gcloud builds submit --no-source --config cloudbuild.credscan.yaml
#   --substitutions _IMAGE=...,_TAG=p1a-<sha>-a
substitutions:
  _IMAGE: 'australia-southeast1-docker.pkg.dev/labops-389703/cloud-run-source-deploy/claude-adapter'
  _TAG: 'p1a'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull "${_IMAGE}:${_TAG}"
        cid="$(docker create "${_IMAGE}:${_TAG}")"
        docker export "$cid" | tar -t > /tmp/files.txt
        docker rm "$cid" >/dev/null
        echo "=== image filesystem entries: $(wc -l < /tmp/files.txt) ==="
        echo "=== cred-bearing FILES (expect NONE) ==="
        # Match ACTUAL secret-bearing files (not library source whose NAME contains
        # "credential"/"secret"): real .env (not .example), private keys, our Hub
        # adapter-config.json, .ois/ creds, .npmrc, ssh keys. Exclude node_modules
        # entirely — it is npm-ci-generated from the registry (deterministic, no
        # locally-injected secrets); OUR leak paths (COPY of .env/.ois/keys into /app
        # or /root) are never under node_modules. This kills the library-filename
        # false positives (google-auth-library/jose source, base-image npm .npmrc).
        if grep -iE '(^|/)\.env(\.[a-z]+)?$|(^|/)[^/]*\.(pem|key|p12|pfx)$|(^|/)id_rsa|(^|/)adapter-config\.json$|(^|/)\.ois/|(^|/)\.npmrc$' /tmp/files.txt \
             | grep -vE '(^|/)node_modules/|\.env\.example$' ; then
          echo "CREDSCAN-FAIL: baked secret-bearing file(s) found"; exit 1
        else
          echo "CREDSCAN-PASS: no baked secret-bearing files (matches were library source under node_modules)"
        fi
options:
  logging: CLOUD_LOGGING_ONLY
