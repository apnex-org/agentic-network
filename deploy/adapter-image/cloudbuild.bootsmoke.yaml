# P1e dep-prune BOOT-SMOKE (the architect's caveat iv): after the prune, the shim's runtime
# MODULE GRAPH must still load — a pruned-away runtime dep breaks at runtime, not build-time, so
# digest-equality + cred-scan alone are not enough. Override the supervisor entrypoint with node
# and dynamic-import the kernel + the MCP SDK (the runtime closure); a missing dep throws
# MODULE_NOT_FOUND -> the build FAILS. Submit: gcloud builds submit --no-source --config this
#   --substitutions _TAG=<the pruned image tag>
substitutions:
  _IMAGE: 'australia-southeast1-docker.pkg.dev/labops-389703/cloud-run-source-deploy/claude-adapter'
  _TAG: 'p1a'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        docker pull "${_IMAGE}:${_TAG}"
        # --entrypoint node overrides the baked supervisor; -w /app so @apnex/* + @modelcontextprotocol
        # resolve from /app/node_modules. Dynamic import (the kernel is ESM).
        docker run --rm --entrypoint node -w /app "${_IMAGE}:${_TAG}" -e '
          Promise.all([
            import("@apnex/network-adapter"),
            import("@apnex/message-router"),
            import("@apnex/cognitive-layer"),
            import("@modelcontextprotocol/sdk/server/index.js"),
            import("@modelcontextprotocol/sdk/server/stdio.js"),
          ]).then(() => { console.log("BOOTSMOKE-MODULES-OK"); })
            .catch((e) => { console.error("BOOTSMOKE-FAIL", e && e.code, e && e.message); process.exit(1); });
        '
        echo "BOOTSMOKE-PASS: pruned image runtime module graph loads (no dep removed that the adapter needs)"
options:
  logging: CLOUD_LOGGING_ONLY
