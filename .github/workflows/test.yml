name: test

# Mission-41 Wave 1 T5 (task-328): workflow-test-harness CI merge-gate.
# Mission-45 Fix B: `test` aggregator as the single branch-protection target.
#
# 2026-04-24 narrowed (PR #4): the `hub` vitest job is split out of the
# matrix and made the sole code-correctness gate. The remaining matrix
# cells were run non-blocking (`continue-on-error`) — re-instated as
# blocking at bug-109 / PR-4c-2 (see below). The `coverage-report-sync`
# job remains required.
#
# bug-109 (2026-05-22): the `vitest-non-hub` job's pre-workspaces
# per-package `npm ci` + per-package `cache-dependency-path` was dead —
# no per-package lockfiles exist post-idea-186, so `actions/setup-node`
# failed at the cache step and the cells never ran their tests. PR-4a
# rebuilt the job (root install + topological sovereign build + per-cell
# test); PR-4b/4c-1 cleared the per-cell debt the un-masking exposed.
# PR-4c-2: all four non-hub cells are genuinely CI-green, so
# `vitest-non-hub` is now in the `test` aggregator's `needs:` and
# `continue-on-error` is dropped — every cell is a blocking gate.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # S1 merge-queue (idea-380): run on the queue's ephemeral merge_group so this
  # REQUIRED check reports on the queued batch. A required status check that does
  # NOT trigger on merge_group stalls the queue forever (it waits for a check that
  # never runs). Pairs with branch-protection require-merge-queue + the per-path
  # CODEOWNERS cross-approve matrix (architect approve = merge-gate; verifier = check).
  merge_group:

# S1 (idea-380): cancel a superseded PR CI run on re-push (saves CI cycles — a
# velocity win). pull_request-ONLY — never cancel a merge_group or push run (a
# cancelled queued-group check would eject the PR from the merge queue).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Required code-correctness gate ───────────────────────────────────
  vitest-hub:
    runs-on: ubuntu-latest
    name: vitest (hub)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      # idea-186 npm workspaces (cleanslate0 hub_rebase): hub is a root
      # workspace. Scoped install of the build-target workspaces from the ROOT
      # lockfile, then an explicit topological build (deps before hub) — replaces
      # the retired per-package `prepare` cascade + the old --prefix pre-installs.
      - name: Install hub workspace (scoped)
        run: npm ci --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub --include-workspace-root --no-audit --no-fund
      - name: Build sovereign packages + hub (topological)
        run: npm run build --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub
      - name: Test
        run: npm test --workspace=hub

  # ── Required coverage-spec-sync gate ─────────────────────────────────
  coverage-report-sync:
    runs-on: ubuntu-latest
    name: workflow-test-coverage in-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install hub workspace (scoped)
        run: npm ci --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub --include-workspace-root --no-audit --no-fund
      - name: Build sovereign packages + hub (topological)
        run: npm run build --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub
      - name: Regenerate coverage report
        run: npm run coverage:invariants --workspace=hub
      - name: Verify committed report matches
        run: |
          if ! git diff --quiet -- docs/audits/workflow-test-coverage.md; then
            echo "::error::docs/audits/workflow-test-coverage.md is out of sync."
            echo "Run 'npm run coverage:invariants --workspace=hub' locally and commit the regenerated file."
            git diff -- docs/audits/workflow-test-coverage.md
            exit 1
          fi

  # ── Blocking: non-hub package vitest cells ───────────────────────────
  # bug-109 / PR-4c-2: all four non-hub cells are genuinely CI-green, so
  # this matrix is a blocking gate — `continue-on-error` dropped, the job
  # added to the `test` aggregator's `needs:`. A cell failure now reds the
  # `test` check; `fail-fast: false` keeps the other cells reporting so a
  # multi-cell break surfaces in a single run.
  vitest-non-hub:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/cognitive-layer
          - packages/network-adapter
          - packages/repo-event-bridge
          - adapters/claude-plugin
          - adapters/opencode-plugin
          - adapters/pi-plugin
    name: vitest (${{ matrix.package }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          # Root lockfile — the 4 packages are npm workspaces of the repo
          # root; there are no per-package lockfiles (bug-109 / PR-4a).
          cache-dependency-path: package-lock.json
      # Scoped install — only the 5 workspaces the non-hub cells need
      # (the set is closed under @apnex/* cross-deps). Deliberately NOT a
      # root --workspaces install: repo-event-bridge + storage-provider
      # carry `prepare: npm run build` hooks that fire `tsc` at install
      # time — and `--ignore-scripts` does NOT suppress a workspace
      # target's own prepare (calibration #62). A root install would run
      # those builds before their deps exist and fail. Mirrors the scoped
      # install in publish-npm.yml's "Install workspaces (scoped)" step.
      - name: Install workspaces (scoped)
        run: |
          npm install --no-audit --no-fund --ignore-scripts \
            --workspace=@apnex/cognitive-layer \
            --workspace=@apnex/message-router \
            --workspace=@apnex/network-adapter \
            --workspace=@apnex/storage-provider \
            --workspace=@apnex/claude-plugin \
            --workspace=@apnex/opencode-plugin \
            --workspace=@apnex/pi-plugin
      # The sovereign packages must be built (dist/) before a cell's
      # vitest can resolve `@apnex/*` (main → dist/index.js).
      # network-adapter ↔ message-router form an import cycle, broken via
      # the multi-pass topological build (see publish-npm.yml's "Build
      # family (topological)" step).
      - name: Build sovereign packages (topological)
        run: |
          rm -rf packages/cognitive-layer/dist packages/network-adapter/dist packages/message-router/dist packages/storage-provider/dist
          ( cd packages/cognitive-layer && npm run build )
          ( cd packages/network-adapter && npm run build ) || true
          ( cd packages/message-router && npm run build )
          rm -rf packages/network-adapter/dist
          ( cd packages/network-adapter && npm run build )
          # work-44: the repo-event-bridge cell's tests import @apnex/storage-provider (-> dist).
          ( cd packages/storage-provider && npm run build )
      - name: Test
        working-directory: ${{ matrix.package }}
        run: npm test

  # ── Blocking: workgraph-sim keystone cell (idea-449) ─────────────────
  # @apnex/workgraph-sim drives the REAL hub WorkGraph FSM (it imports
  # hub/dist), so — unlike the non-hub cells — it needs hub itself built.
  # Mirror vitest-hub's scoped install + topological build (hub's sovereign
  # deps → hub), then build + vitest the sim. Added to the `test` aggregator.
  vitest-workgraph-sim:
    runs-on: ubuntu-latest
    name: vitest (packages/workgraph-sim)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install hub + sim workspaces (scoped)
        run: npm ci --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub --workspace=@apnex/workgraph-sim --include-workspace-root --no-audit --no-fund
      - name: Build hub (topological) + sim
        run: |
          npm run build --workspace=@apnex/storage-provider --workspace=@apnex/repo-event-bridge --workspace=hub
          npm run build --workspace=@apnex/workgraph-sim
      - name: Test
        run: npm test --workspace=@apnex/workgraph-sim

  # ── Blocking: ois shell regressions (piuplift0 p1 / PR #606) ─────────
  # ois/bin/ois is bash, outside the npm workspaces, so it has no vitest
  # cell. This job gives it CI coverage: a syntax check + the self-contained
  # shell regressions (jq is preinstalled on ubuntu-latest). Currently the
  # sovereign per-seat config-dir null-guard + pi_seed fail-closed contract.
  ois-shell-tests:
    runs-on: ubuntu-latest
    name: ois shell tests
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check ois
        run: bash -n ois/bin/ois
      - name: Run ois shell regressions
        run: |
          bash scripts/test/ois-seat-configdir.test.sh
          bash scripts/test/ois-fleet-seat-config.test.sh
          bash scripts/test/exact-internal-lineage.test.sh
          bash scripts/test/publish-exact-frozen-tgzs.test.sh
          bash ois/test/reap-scope.test.sh
          bash ois/test/seat-identity.test.sh
          bash ois/test/socket-isolation.test.sh
          bash ois/test/reset.test.sh

  # ── Claude product-path gate ───────────────────────────────────────
  claude-plugin-product-path:
    runs-on: ubuntu-latest
    name: claude plugin product path
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@11.6.2
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build, acquire, install, copy, start and connect
        env:
          OIS_BUILD_DIRTY: "false"
          SOURCE_DATE_EPOCH: "0"
        run: |
          export OIS_BUILD_SHA="$(git rev-parse HEAD)"
          export OIS_BUILD_TREE="$(git rev-parse HEAD^{tree})"
          node scripts/test/claude-plugin-product-path.test.mjs
          node scripts/test/claude-plugin-deprecation.test.mjs

  # ── Aggregator: single status-check name for branch-protection rules ─
  # Branch-protection rule targets `test` (a stable name); the
  # dependencies below decide what gates are load-bearing. Matrix
  # structure can evolve above without touching the rule.
  # Mission-45 Fix B (thread-275) established the aggregator pattern;
  # 2026-04-24 (PR #4) narrowed the `needs` list to drop the 4
  # infrastructure-broken matrix cells; bug-109 / PR-4c-2 re-added the
  # `vitest-non-hub` matrix once all four cells were genuinely CI-green.
  test:
    name: test
    needs: [vitest-hub, coverage-report-sync, vitest-non-hub, vitest-workgraph-sim, ois-shell-tests, claude-plugin-product-path]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required test jobs passed."
