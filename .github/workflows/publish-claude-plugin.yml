name: publish-claude-plugin

# Dedicated product path for the dependency-free Claude package. The legacy
# six-package publisher is deliberately not an authority for this package.
on:
  push:
    tags:
      - 'claude-plugin-v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-claude-plugin
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bind clean source and exact release tag
        run: |
          test -z "$(git status --porcelain)"
          version="$(node -p "require('./adapters/claude-plugin/package.json').version")"
          test "$version" = "0.1.20"
          if [ "${{ github.event_name }}" = push ]; then
            test "${GITHUB_REF#refs/tags/}" = "claude-plugin-v$version"
          fi
          {
            echo "CLAUDE_VERSION=$version"
            echo "OIS_BUILD_SHA=$(git rev-parse HEAD)"
            echo "OIS_BUILD_TREE=$(git rev-parse HEAD^{tree})"
            echo "OIS_BUILD_DIRTY=false"
            echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          registry-url: 'https://registry.npmjs.org'
          scope: '@apnex'

      - name: Install exact script-free toolchain
        run: |
          npm install --global npm@11.6.2
          test "$(npm --version)" = "11.6.2"
          npm ci --ignore-scripts --no-audit --no-fund

      - name: Build and execute Claude product path
        run: |
          node scripts/build/build-self-contained-claude-plugin.mjs
          node scripts/test/claude-plugin-product-path.test.mjs

      - name: Freeze exact package bytes
        run: |
          rm -rf /tmp/claude-candidate && mkdir -p /tmp/claude-candidate /tmp/claude-realized
          npm pack --workspace=@apnex/claude-plugin --ignore-scripts --json --pack-destination /tmp/claude-candidate > /tmp/claude-pack.json
          tgz="/tmp/claude-candidate/$(jq -r '.[0].filename' /tmp/claude-pack.json)"
          integrity="$(jq -r '.[0].integrity' /tmp/claude-pack.json)"
          test "$(node scripts/release/verify-claude-plugin-package.mjs integrity "$tgz")" = "$integrity"
          npm install "$tgz" --prefix /tmp/claude-realized --ignore-scripts --no-audit --no-fund --omit=dev
          test "$(jq '.packages | length' /tmp/claude-realized/package-lock.json)" = 2
          node scripts/release/verify-claude-plugin-package.mjs inspect /tmp/claude-realized/node_modules/@apnex/claude-plugin "$CLAUDE_VERSION" > /tmp/claude-projection.json
          test "$(jq -r '.provenanceRepository' /tmp/claude-projection.json)" = "https://github.com/apnex-org/agentic-network"
          echo "CLAUDE_CANDIDATE_TGZ=$tgz" >> "$GITHUB_ENV"
          {
            echo "### Frozen Claude publication candidate"
            echo "- package: @apnex/claude-plugin@$CLAUDE_VERSION"
            echo "- source commit: $OIS_BUILD_SHA"
            echo "- source tree: $OIS_BUILD_TREE"
            echo "- npm integrity: $integrity"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Verify fresh identity and publish through protected CI
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          test -f "$CLAUDE_CANDIDATE_TGZ"
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            npm publish "$CLAUDE_CANDIDATE_TGZ" --access public --provenance --ignore-scripts --dry-run
            exit 0
          fi
          if npm view "@apnex/claude-plugin@$CLAUDE_VERSION" version >/tmp/claude-existing 2>/dev/null; then
            echo "::error::fresh version already exists: $(cat /tmp/claude-existing)"
            exit 1
          fi
          npm publish "$CLAUDE_CANDIDATE_TGZ" --access public --provenance --ignore-scripts
