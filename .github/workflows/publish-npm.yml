name: publish-npm

# THE single publish channel for the @apnex/* family (all three harness plugins
# + sovereign packages). A real publish happens ONLY on a git tag push `npm-v*`
# — workflow_dispatch always runs as a dry-run validation, so every artifact on
# the registry traces to a tag. (The former second channel — release-plugin.yml
# building a self-contained GitHub-Release tarball for claude-plugin — is
# retired: the npm tarball is now the complete consumer artifact, including the
# staged skills/ payload via claude-plugin's prepack.)
#
# Per-package versions live in each package.json; the tag string only gates the
# run. The version-bump --assert gate (each package's prepack) enforces that
# shipped src changes carry a version bump.
#
# Safe publish path: scripts/publish-packages.sh publishes an EXPLICIT package
# list in topological order and HOISTS the version-rewrite (* → ^X.Y.Z) with a
# trap-revert. This avoids two traps: (a) `npm publish --workspaces` would
# attempt private/non-registry workspaces (storage-provider/repo-event-bridge
# are not private:true); (b) `npm publish --workspace=X` skips root's
# prepublishOnly rewrite (calibration #35) and would ship `*` deps. The rewrite
# declares its mutations in a manifest (OIS_BUILD_INFO_DIRTY_IGNORE) so
# build-info stamps an honest dirty:false on tagged CI builds.
#
# Auth: setup-node writes a project .npmrc wired to NODE_AUTH_TOKEN; the script's
# .npmrc preflight is satisfied by that file, and NPM_TOKEN (repo secret) drives
# both the auth-token and the script's own preflight.

on:
  push:
    tags:
      - 'npm-v*'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the version-bump --assert gate (prepack) does a git
          # ancestry check (versionCommit vs latest src/ commit).
          fetch-depth: 0

      # registry-url makes setup-node write a project .npmrc that reads
      # NODE_AUTH_TOKEN — satisfies publish-packages.sh's .npmrc preflight AND
      # authenticates `npm publish`.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@apnex'

      # Scoped install — MUST mirror test.yml's proven-working list exactly.
      # --ignore-scripts: repo-event-bridge/storage-provider carry prepare:tsc
      # hooks that would fire before their deps exist (calibration #62). The
      # list must include storage-provider even though it is NOT published here:
      # npm only symlinks NAMED workspaces, and the network-adapter ↔
      # message-router cyclic tsc build needs every @apnex/* workspace linked to
      # resolve its module graph. Omitting storage-provider broke the cyclic
      # build in CI (dry-run run #28554852955: network-adapter tsc "Cannot find
      # module '@apnex/message-router'").
      - name: Install workspaces (scoped)
        run: |
          npm install --no-audit --no-fund --ignore-scripts \
            --workspace=@apnex/cognitive-layer \
            --workspace=@apnex/message-router \
            --workspace=@apnex/network-adapter \
            --workspace=@apnex/storage-provider \
            --workspace=@apnex/claude-plugin \
            --workspace=@apnex/opencode-plugin \
            --workspace=@apnex/pi-plugin

      # Sovereign packages must have dist/ before publish (main → dist/index.js)
      # + build-info.json for build-identity. network-adapter ↔ message-router
      # cycle broken via the multi-pass build (per test.yml).
      - name: Build family (topological)
        run: |
          rm -rf packages/cognitive-layer/dist packages/network-adapter/dist packages/message-router/dist
          ( cd packages/cognitive-layer && npm run build )
          ( cd packages/network-adapter && npm run build ) || true
          ( cd packages/message-router && npm run build )
          rm -rf packages/network-adapter/dist
          ( cd packages/network-adapter && npm run build )
          ( cd adapters/claude-plugin && npm run build )
          ( cd adapters/opencode-plugin && npm run build )
          ( cd adapters/pi-plugin && npm run build )

      # Artifact-completeness gate (successor of release-plugin.yml's
      # calibration #62 check, adapted to the npm shape): the claude-plugin
      # tarball must carry the built shim, its build identity, the harness
      # manifest, and the full skills payload + bootstrapper. Sovereign deps are
      # registry refs now — no vendored apnex-*.tgz expected.
      - name: Verify claude-plugin npm artifact structurally complete
        env:
          OIS_SKIP_VERSION_ASSERT: '1'  # shape check only — the publish step still gates
        run: |
          cd adapters/claude-plugin
          TGZ=$(npm pack --silent)
          for path in \
            "package/dist/shim.js" \
            "package/dist/build-info.json" \
            "package/agent-adapter.manifest.json" \
            "package/skills/survey/" \
            "package/lib/bootstrap-skills.sh" \
            "package/install.sh"; do
            tar tzf "$TGZ" | grep -q "$path" || \
              { echo "ERROR: $path missing from $TGZ" >&2; exit 1; }
          done
          rm -f "$TGZ"
          echo "✓ claude-plugin npm artifact structurally complete"

      # Publish (or dry-run). Real publish ONLY on tag push — dispatch is a
      # validation run by construction, so every registry artifact traces to a
      # git tag.
      - name: Publish @apnex/* family
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "→ REAL publish (tag ${GITHUB_REF#refs/tags/})"
            bash scripts/publish-packages.sh
          else
            echo "→ dry-run publish (workflow_dispatch is validation-only; tag npm-v* to publish)"
            bash scripts/publish-packages.sh --dry-run
          fi
