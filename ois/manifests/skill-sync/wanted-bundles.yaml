# wanted-bundles.yaml — claude/ois skill-sync manifest (Arc-1 S4 / idea-453).
#
# Declares which mission-kit skills the claude fleet carries. The
# `mission_kit_sync` step in ois/bin/ois::claude_seed resolves these against
# apnex/mission-kit and copies the SKILL.md trees into the agent's sovereign
# $CLAUDE_CONFIG_DIR/skills/, ALONGSIDE the local-repo skills (per-skill merge,
# never a wipe). Mirrors hermes/manifests/skill-sync/wanted-bundles.yaml — same
# format, same apnex/mission-kit source — and extends the mission-103
# constitution-sync pattern (mission-kit canonical, synced fleet-wide) from
# axioms to SKILLS for the claude/ois path.
#
# Format:
#   bundles:      - <name>   resolved via mission-kit bundles/<name>.yaml (`skills:` list)
#   extra_skills: - <name>   individual skill, resolved via mission-kit skills/<name>/SKILL.md
#
# BASELINE NOTE (fleetskills0, 2026-07-13): the uniform fleet baseline is the 4 skills
# declared below — arc-lifecycle + survey (operator sensemaking) and the
# workgraph-arc-operator + workgraph-arc-closeout pair (WorkGraph arc execution + its
# terminal closeout). substrate-audit + research-artefacts were the earlier M2-sidecar
# set and were DROPPED from the fleet baseline here (they remain in mission-kit for
# ad-hoc use, not fleet-synced). K1/K2 flat rule-cards + O1-convene-council remain
# Director-owned mission-kit promotions; add them here once promoted.
#
# Source is PINNED for reproducible activation — the deployed sync pulls this
# REVIEWED mission-kit SHA, not whatever `main` happens to be at activation time.
# To adopt newer mission-kit skills: review the target commit, then bump
# `source_ref` to its SHA and re-stage (this is the reviewable diff). Env vars
# SKILL_SYNC_REPO / SKILL_SYNC_REF override at runtime (testing only).
source_repo: https://github.com/apnex/mission-kit.git
source_ref: a874bd371920ab62c3664318eb190ab17cfadaac

bundles: []

extra_skills:
  - arc-lifecycle
  - survey
  - workgraph-arc-closeout
  - workgraph-arc-operator
