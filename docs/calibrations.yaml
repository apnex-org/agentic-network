      isPeerPresent for routing eligibility) silently dropped ALL agentId-targeted
      Hub dispatches in the ~35min window between PR #183 merge (1464a11a) and
      bug-56 fix merge (c635db9). During the outage, architect (lily) needed
      engineer-side cross-approval on PR #185 (the bug-56 hot-patch) + PR #184
      (calibrations doc-only) for branch-protection unblock — but bilateral
      thread comms (the architect's normal channel for cross-approval ask) were
