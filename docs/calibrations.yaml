  - id: 78
    class: methodology
    title: "CROSS-LAYER IDENTITY EXTRACTION — architectural-overreach pattern: mechanism design conflates credential-identity with role-identity; retirement-disposition rubric"
    origin: mission-85
    surfaced_at: bug-98 architect-Director-engineer triage thread-587 (10 rounds) 2026-05-19 — Option W "retire subsystem" disposition ratified after fix-attempt iterations (X commit-author parse / Y per-identity credentials / Z architect target.agentId resolution) all failed to preserve original intent; missioncraft v5 architectural-intent reference (sibling-repo `/home/apnex/taceng/missioncraft/src/missioncraft-sdk/core/principal-resolution.ts` 4-step precedence chain) confirmed single-credential at operator-machine layer is correct architectural shape
    status: closed-structurally
    closure_mechanism: |
      Pattern signature: a mechanism is designed to map data at one
      attribution-layer (e.g., credential-identity at operator-machine layer)
      into a different attribution-layer (e.g., role-identity at Hub-context
      layer). The mechanism appears to work in the trivial case but breaks
      structurally when the source-layer's multiplicity doesn't match the
      target-layer's multiplicity. Fix-iterations cannot resolve via mechanism
      tuning; only via mechanism retirement.

      Instance (mission-85 / bug-98): commit-pushed-handler subsystem
      (mission-68 W1; docs/methodology/mission-lifecycle.md §1.5.1.1
      pre-retirement Layer (c)) attempted to map `PushEvent.actor.login`
      (GitHub credential-identity; singular at operator-machine layer per
      shared `apnex` org-credential) → individual agent role (Hub-context
      role-identity; multi). 4-identity-system analysis showed 3 of 4 systems
      (Hub agent label `ois.io/github/login` + git config user.email +
      missioncraft principal-id) already correctly individually-attributed;
      only GitHub credential (System 3) is necessarily singular at machine
      layer. The architectural error was attempting to extract
      role-identity FROM credential-identity — layer-inverted attribution.

      Diagnostic test (3-question rubric for disposing layer-extraction
      mechanisms):
        Q1 — Does the data-shape required by the fix exist in the upstream
             API response?
             (mission-85: Option X commit-author parse — NO; GitHub /events
             API PushEvent returns commits[]=0 items; data not available)
        Q2 — Does the alternative require duplicating already-aligned
             identity systems?
             (mission-85: Option Y per-identity-credentials — YES; would
             force per-agent SSH-key + per-agent gh-auth-status management;
             violates missioncraft v5 inheritance intent)
        Q3 — Is there an existing operational pattern that bypasses the
             broken mechanism?
             (mission-85: engineer-thread-explicit-surface on coord-thread
             — YES; empirically operational across mission-84's 6-PR cycle +
             bug-99/100/101 cycles; manually-attributed at human boundary)

      Disposition rubric: if Q1+Q2 fail AND Q3 succeeds → RETIRE the
      mechanism; codify the operational alternative as the canonical path.
      Preserve adjacent layers that are correctly architectural (mission-85:
      Layer (a) methodology + Layer (b) adapter-side hook preserved as
      engineer-side discipline; only Hub-side Layer (c) Layer-inverted-
      attribution mechanism retired).

      Closure: mission-85 (M-Commit-Pushed-Handler-Retirement; PR #217
      squash-merged at 72b36c5 2026-05-19; ~15 min wall-time bounded
      subsystem-retirement). 11/13 AG-N verified pre-Phase-9; AG-12
      (mission-status=completed) + AG-13 (this calibration entry) close
      ledger gates. Hub-rebuilt clean post-merge (22/22 SchemaDefs;
      PolicyRouter 71 tools; bridge running; no commit-pushed-handler
      registration).

      Companion methodology-fold: docs/methodology/mission-lifecycle.md
      §1.5.1.1 revised 3-layer → 2-layer; Failure-resilience hierarchy
      revised (Layer (b) now load-bearing for adapter-side; engineer-
      thread-explicit-surface composes architect-visibility); docs/methodology/
      engineer-runtime.md commit-push thread-heartbeat row revised to
      preserve (a)+(b) 2-layer description.

      Director-Direct "Yes file" disposition 2026-05-19 ratified ledger-
      filing at Phase 10 retro per architect-Director-bilateral path
      (feedback_calibration_ledger_discipline).

      Mission-85 architect-side meta-observation (Design v0.1 §8 inward-
      calibration note): bilateral audit-round structurally essential for
      architect-authored Design docs — engineer round-1 audit caught 2
      B-class architect-spec-vs-code drift instances in v0.1 (missioncraft
      sibling-repo anchor not annotated + CLAUDE.md vs mission-lifecycle.md
      §1.5.1.1 file-path mislocated). Composes with substrate-currency-audit-
      rubric + architect-review-doc-behavioral-claims-code-verify prior
      calibrations.
    closure_pr: 217
