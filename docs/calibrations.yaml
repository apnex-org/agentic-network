  - id: 76
    class: methodology
    title: "Compositional-gaps at multiple layers caught by architect-side real-upstream + real-build dogfood (substrate + test-stack + engineer-side ship-verify discipline)"
    origin: mission-78-W5-new + W5-new-extension
    surfaced_at: thread-548 round 12 + thread-549 round 2 — architect-side dogfood post W5-new ship at eb13ab1 → GAP-1 force-push BLOCKER (Fix #12) + tsc-strict-build TS2353 (Fix #12.b) + engineer-side ship-verify-language drift
    status: closed-folded
