  - id: 87
    class: methodology
    title: "Version-bump co-commits with the FINAL src PR of a ship — splitting the bump from its source change false-fires the ship-path version-gate (frozen-version / src-ahead-of-version)"
    origin: autonomous-stint-3 (idea-355 opencode redeploy)
    surfaced_at: autonomous-stint-3 2026-06-27 — the opencode bundle ship fired the write-build-info --assert version-gate 3x across PRs #376/#377/#378; first a FROZEN version (src advanced, the stamped version did not), then SRC-AHEAD-OF-VERSION after a partial bump landed before the final src PR; resolved only when the bump co-committed with the last src change before publish
    status: open
    closure_mechanism: |
      Pattern signature: a ship whose artifact carries a stamped version
      (esbuild bundle, npm package) splits the version-BUMP commit from the
      FINAL source-change commit of the ship. The ship-path version-gate
      (release-opencode-plugin.sh step 1 write-build-info --assert / the
      wired packages' prepack hook) then false-fires on the transient
      mismatch — either FROZEN-version (src advanced, stamp did not) or
      SRC-AHEAD-OF-VERSION (a partial bump landed before the last src PR).
      The gate is correct (tele-7 fail-loud); the churn is self-inflicted by
      commit ordering.

      Discipline: the version-bump co-commits with the FINAL src PR of a ship
      (the last change before publish), never as a separate earlier/later
      commit. NEVER bypass the gate to "unstick" a mismatch — fix the
      ordering. Corollary to the never-bypass-the-ship-path-gate axiom.
      OPEN until folded into the ship/release discipline
      (release-opencode-plugin.sh header + multi-agent-pr-workflow.md
      ship-path subsection).
