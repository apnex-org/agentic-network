  - id: 85
    class: methodology
    title: "RECONCILE contradictory operational docs against ground-truth before relying on either — unreconciled doc contradiction produces a near-miss (watchtower-functional / :latest-push-IS-a-deploy)"
    origin: mission-90
    surfaced_at: mission-90 retrospective §4 candidate 9 2026-06-20 — the cutover runbook + the architect session-long mental model held watchtower-non-functional / manual-IAP-SSH-deploy while the Design own §4 cadence note recorded the opposite (bug-140 watchtower auto-deploy); the contradiction went unreconciled until a live deploy proved watchtower functional (W8 auto-deployed ~40s after the :latest push), exposing a near-miss — an architect-authorized non-prod-mutating pre-build during a Director deploy-HOLD would actually have deployed
    status: closed-folded
    closure_mechanism: |
      Pattern signature: two operational sources (or a doc vs a mental
      model) assert contradictory facts about a deploy mechanism; the
      contradiction is carried unreconciled and one side is relied upon.
      Here: runbook + architect-model said watchtower non-functional /
      manual deploy; the Design §4 said auto-deploy. Consequence: a :latest
      push is treated as non-prod-mutating when it is actually a ~5-min
      auto-deploy — a near-miss when that pre-build was authorized during a
      deploy-HOLD. Discipline: when two operational sources disagree,
      reconcile against GROUND-TRUTH (probe the live mechanism) before
      relying on either; treat any :latest push as a prod-mutating deploy.
      The operational facts (code-only-redeploy class; comms-dark =
      Hub-is-the-channel) are captured in the corrected runbook + Design and
      NOT duplicated here; this entry captures the METHODOLOGY meta-lesson.
      Folded into retro §4 candidate 9; runbook B.3 + Design §4 corrected in
      PR #324.

