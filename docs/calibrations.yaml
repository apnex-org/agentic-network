  - id: 92
    class: substrate
    title: "EMIT-NULL-NOT-OMIT in projections — a projection must emit an explicit null for an absent field, never omit the key; JSON.stringify drops undefined, producing a shape-inconsistent key-set that breaks downstream field-access silently"
    origin: autonomous-stint-4 (bug-198 fix / #407)
    surfaced_at: autonomous-stint-4 2026-06-28 — verifier (steve) catch #4 on #407; the list_bugs compact projection dropped missionClass when undefined (vs emitting null), so a consumer reading the key on a class-less bug hits a missing key rather than a null
    status: open
    closure_mechanism: |
      Pattern signature: a compact/list projection conditionally includes a
      field only when present, so the serialized object's key-SET varies row to
      row. A downstream consumer that reads obj.field gets undefined for two
      DIFFERENT reasons (field genuinely null vs key omitted) and cannot
      distinguish them; with JSON.stringify the undefined value is dropped on
      the wire, so even an explicit `field: undefined` vanishes. The honest
      shape is a STABLE key-set: emit `field: null` for an absent optional.

      Discipline: projection encoders emit every declared optional as an
      explicit null when absent, never by omission. This is the read-side peer
      of the storage-side RETIRED #19 (schema-rename without state migration)
      and of the faithful-shape family (#79/#82) — shape-consistency across the
      membrane, now at the PROJECTION boundary. Peer-verified by steve's catch.
      OPEN until folded into a projection-encoder lint / the list-filter
      compact-projection helper enforces null-fill.
    closure_pr: 410
    pattern_membership: []
    cross_refs:
      - autonomous-stint-4 (bug-198 / #407 list_bugs compact projection)
      - "#19 (schema-rename-without-state-migration; storage-side ancestor, retired)"
      - "#79 / #82 (faithful-shape family; this is the projection-boundary peer)"
      - "PR #407 (filter-optionality + compact projection)"
      - docs/reviews/autonomous-stint-4-retrospective.md §5 (verifier catch #4) + §6
