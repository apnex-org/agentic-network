  - id: 88
    class: methodology
    title: "Re-introduction guard scan-scope must match the DEFECT-CLASS scope — a guard scoped to the originally-patched subset leaves the defect live in unscanned siblings (false-green partial verification)"
    origin: autonomous-stint-3 (bug-178)
    surfaced_at: autonomous-stint-3 2026-06-27 — bug-178's first fix (#381) patched 19 testcontainer test files + added a re-introduction guard scanning only 2 directories, while ~23 further test files outside those dirs still constructed raw `new Pool`; the guard reported green over a subset of its own defect class (caught + swept via work-25/#384, which broadened the guard to recursive hub/src + hub/test)
    status: open
    closure_mechanism: |
      Pattern signature: a fix adds a re-introduction guard
      (lint/grep/CI-assert) to stop a defect class recurring, but the guard's
      SCAN-SCOPE is drawn around the files the fix happened to touch rather
      than around the full DEFECT-CLASS surface. The guard then certifies
      green while the same defect persists in unscanned siblings — a
      "mostly-verified" state (tele-8 anti-pattern) presenting as a silent
      false-green (tele-7).

      Discipline: when adding a re-introduction guard, define its scan-scope
      from the DEFECT CLASS ("every test that should use the shared fixture",
      "every consumer of the relocated field"), not from the patched subset;
      the guard must fail on a planted violation ANYWHERE in that class, not
      only in the originally-fixed files. Pairs with #81 (premature
      structural-closure from partial verification) + the stint
      ground-truth-the-full-surface discipline.
      OPEN until folded into the engineer-runtime ship-verify discipline
      (re-introduction-guard scoping checklist).

      CLAIM-TIME SIZING COROLLARY (autonomous-stint-3, greg's intake): the
      same scope-to-the-class discipline applies at CLAIM-TIME, not only at
      guard-time. A scoping grep scoped to the SURFACING SYMBOL (the one file /
      one identifier that surfaced the defect) under-counts the defect-class
      blast-radius and therefore MIS-SIZES the work at claim-time — a "2-file"
      fix is really a ~42-file class. Recurring this stint: W4 (the bug-178
      raw-Pool sweep was sized off the surfacing dirs, not the class) +
      bug-178 + bug-190 (the surfacing symbol under-counted the seam class).
      Discipline: when sizing a claim, grep for the DEFECT CLASS (every
      sibling that shares the pathology), not the surfacing symbol, before
      committing to an estimate. So #88 is now TWO faces of one discipline:
      scope-to-the-class for re-introduction GUARDS AND for CLAIM-TIME SIZING.

      THIRD FACE (autonomous-stint-4, bug-200 / #410 — verifier catch #5,
      engineer-amplified): FIX-TIME adjacent-signal-in-the-same-handler. When
      you fix a class defect (silent-truncation / misleading-certainty), sweep
      EVERY adjacent signal in the handler your fix touches — not just the one
      that surfaced. #410 fixed the listBugs count-lie (added `truncated`) but
      the SIBLING `_ois_query_unmatched` sentinel in the same path still
      asserted "definitively none" over the now-known-truncated scan (steve's
      catch). Engineer (greg): "fix the class includes the path your own fix
      sits next to." So #88 is now THREE faces of one scope-to-the-class
      discipline: re-introduction GUARDS · CLAIM-TIME SIZING · FIX-TIME
      adjacent-signal-in-same-handler. The positive design-contract peer is #94
      (truncation-honesty-as-list-contract — don't emit unguarded certainty in
      the first place).
    cross_refs:
