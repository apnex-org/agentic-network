      - tele-4
      - tele-5

  - id: 93
    class: methodology
    title: "SQUASH-SHA RECONCILIATION — reconcile fix-SHAs against main-ancestry (git merge-base --is-ancestor) and record the SQUASH commit SHA, not the branch SHA; substring-matching a SHA is a trap (a branch SHA never appears in a squash-merged main history)"
    origin: autonomous-stint-4 (idea-364 reconcile.py / #403)
    surfaced_at: autonomous-stint-4 2026-06-28 — verifier (steve) catch #3 on #403 (substring-backfill would stamp wrong fixCommits) + the R2 curation (6 squash-sha corrections bug-24/93/167/168/169/170; bug-181 branch 9ec45ee squashed to real fix 5c64f58); cross-validated vs steve's independent hand-audit
    status: open
    closure_mechanism: |
      Pattern signature: under squash-merge, a PR's branch commit SHAs do NOT
      appear in main's history — main carries a single new squash SHA. So any
      ledger that records a branch SHA as the fixCommit, or that verifies a fix
      by substring-matching a SHA against a commit list, is structurally wrong:
      the branch SHA is never an ancestor of main, and a substring match is a
      false-attribution trap (a short SHA can substring-collide).

      Discipline: (1) determine fix-presence with `git merge-base --is-ancestor
      <sha> origin/main` (exact, squash-safe), not substring; (2) RECORD the
      squash SHA (via `gh pr view <n> --json mergeCommit`), not the branch SHA;
      (3) reconcile the Bug ledger's fixCommits against main-ancestry, not
      against branch state. Mechanized in reconcile.py (idea-364): merge-base
      ancestry check + squash-sha recording + 3 disposition buckets, auto-
      backfilling only the safe additive bucket. Cross-validated vs an
      independent hand-audit (the divergence there was a list_bugs scan-cap,
      bug-200, not a logic gap — which itself validated mechanized > by-hand).
      OPEN until reconcile.py --apply (idea-379) makes stint-open reconciliation
      zero-touch on the safe bucket.
    closure_pr: 403
    pattern_membership: []
    cross_refs:
      - autonomous-stint-4 (idea-364 reconcile.py)
      - "PR #403 (git-aware reconcile CLI) / #408 (cross-validation)"
      - idea-364 (M-Ledger-Reconciliation) / idea-379 (reconcile.py --apply)
      - "bug-181 (branch 9ec45ee squashed to real fix 5c64f58)"
      - docs/audits/work-50-reconcile-cross-validation.md
      - docs/reviews/autonomous-stint-4-retrospective.md §6
    tele_alignment:
      - tele-1
      - tele-4

  - id: 94
    class: substrate
    title: "TRUNCATION-HONESTY-AS-LIST-CONTRACT — any bulk-list/aggregate that can hit a scan-cap MUST emit a `truncated` flag, and ANY certainty derived from a capped scan (count, total, 'zero matches', 'definitively none') is a lie unless guarded by it"
    origin: autonomous-stint-4 (bug-200 / #410)
    surfaced_at: autonomous-stint-4 2026-06-28 — engineer (greg) intake + verifier (steve) catch #5; listBugs returned total:100 (lied vs psql:198) with no flag, and the `_ois_query_unmatched` sentinel asserted "definitively none" over a TRUNCATED scan
    status: open
    closure_mechanism: |
      Pattern signature: a list/aggregate handler caps its scan (page limit,
      result cap) but reports derived certainty — a total count, a "zero
      matches" sentinel, an aggregate — as if the scan were complete. The
      report is a tele-4 silent-failure: a confident answer over an incomplete
      read. The honest primitive (list_ready_work) already carries `truncated`;
      the list_bugs family did not, so a 100-cap presented as the whole ledger
      and a no-match sentinel presented as authoritative.

      Discipline (the LIST CONTRACT): (1) every capped bulk-list emits
      `truncated:true` when the cap is hit; (2) any certainty derived from the
      scan (count/total/no-match sentinel) is INVALID unless the scan was
      complete — guard it on !truncated; (3) for an accurate aggregate over a
      cap-limited substrate, query PER-PARTITION (each partition < cap) and sum
      rather than one capped list (the PER-STATUS-ACCURATE-AGGREGATE corollary —
      get_backlog_health queries per-status to get an honest funnel total
      despite the single-list cap). This is the positive design-contract peer
      of #88 (fix-time-same-handler-sweep): #88 says sweep every certainty
      signal in a handler you fix; #94 says don't emit unguarded certainty in
      the first place. Peer-surfaced (greg engineer intake) + steve catch #5.
      OPEN until the list-projection helper enforces truncated-fill + the
      no-match sentinel is guarded across the list_* family.
    closure_pr: 410
    pattern_membership: []
    cross_refs:
      - autonomous-stint-4 (bug-200 listBugs scan-cap + bug-201-adjacent _ois_query_unmatched)
      - "PR #410 (scan-cap honesty + truncated flag) / #409 (get_backlog_health per-status aggregate)"
      - "#88 (fix-time-same-handler-sweep; the fix-scope peer)"
      - list_ready_work (the honest-primitive precedent that already carries truncated)
      - docs/reviews/autonomous-stint-4-retrospective.md §6 (incl. PER-STATUS-ACCURATE-AGGREGATE corollary)
    tele_alignment:
      - tele-4
      - tele-1

  - id: 95
    class: methodology
    title: "Cross-lineage cutover without a runtime acceptance gate — same-lineage suite-green is not a completeness signal for a cross-lineage deliverable (mission-92)"
    origin: mission-92
    surfaced_at: "mission-92 dedup optimality audit 2026-06-21 (PR #339) + thread-676 (Steve verifier cross-check); rescued from PR #342 (stale colliding id #88) during stint-5 PR-backlog triage 2026-06-29"
    status: closed-folded
    closure_mechanism: |
      mission-92 graded an OpenCode-shim deliverable on a code-tidiness metric
      (line-count / delegation-to-core) while the real risk surface for a bundle a
      CROSS-LINEAGE peer (Steve, GPT-5.5/OpenCode) runs is behavioural-contract
