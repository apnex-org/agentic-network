  - id: 82
    class: methodology
    title: "FAITHFUL-HARNESS-as-EXPOSURE — making the test substrate store the production shape is the single highest-leverage exposure mechanism for shape-migration missions; harness fidelity to prod is non-negotiable"
    origin: mission-90
    surfaced_at: mission-90 retrospective §2.2 2026-06-20 — one fidelity change (setWriteEncoder in the harnesses + the memory factory default) took the suite from green-but-lying to red-and-honest (193 failures) and surfaced the entire latent prod-defect class
    status: closed-folded
