  - id: 96
    class: methodology
    title: "AGREEMENT-PIN every load-bearing invariant — a test must FAIL when its target breaks (non-vacuity); an invariant held 'true by construction' across PARALLEL code paths must be pinned by an explicit agreement assertion, never trusted to stay equal"
    origin: stint-5 (mission-96)
    surfaced_at: "stint-5 cold-start-spine adversarial-verify 2026-06-28/29 (idea-380 S2): PRs #416/#417/#418 each drew a verifier CHANGES_REQUESTED for a load-bearing invariant not mutation-pinned (targetRef-drop / completionDependsOn-parity / dash-exclusion-collision); #419 the no_claimable_ready literal value-unpinned; #420 getStintProjection re-implements k/N as a parallel path to computeCompletionProgress (the gate) — provably equal for all current inputs but NOT pinned"
    status: closed-structurally
    closure_mechanism: |
      Two-part discipline, both proven during the stint-5 cold-start-spine builds:
      (a) NON-VACUITY — a passing test is not evidence until you confirm it FAILS when
      its target breaks. The architect-spawned adversarial-verify model now mutates each
      claimed invariant in an isolated worktree, confirms the specific test goes RED,
      then reverts (M1..Mn per PR). A test green-when-broken is vacuous.
      (b) AGREEMENT-PIN for "by construction" claims — when an invariant is asserted to
      hold "by construction" across two code paths (e.g. a projection that re-implements
      a count the enforcement gate also computes), that is usually a PARALLEL
      re-implementation, not a shared predicate: provably-equal-today but a latent drift
      surface (change one definition, the other silently lags). Pin it with an explicit
      agreement assertion (deepEquals between the two paths for the same input) that reds
      the instant they diverge — strictly stronger than the prose claim, and cheaper than
      forcing a shared hot-path helper. Recurrence across #416-#420 shows per-PR vigilance
      is insufficient; this is the standing verify contract. An unpinned parallel-agreement
      IS a deferred divergence (see the deferred-divergence-becomes-drift pattern).
    cross_refs:
      - "#79 (false-green-at-scale; the precision/fidelity sibling)"
      - "#83 (deep-adversarial-audit; the recall sibling)"
      - "#88 (re-introduction guard scan-scope; the coverage-completeness sibling)"
      - "PRs #416 / #417 / #418 / #419 / #420 (idea-380 S2 cold-start spine)"
      - deferred-divergence-becomes-drift (pattern)
    tele_alignment:
      - tele-7
      - tele-8

  - id: 97
    class: methodology
    title: "RECONCILE ancestry must be checked against a FRESH upstream main — a stale local main ref silently inverts git merge-base --is-ancestor, producing wrong dispositions + wrong auto-backfills (corollary to #93)"
    origin: stint-5 (mission-96)
    surfaced_at: "stint-5 S0-RECON 2026-06-28 (work-77): reconcile.py run against the default --main main on a worktree whose local main was 90 commits stale produced 37 FALSE claims-fixed-but-not-in-main (e.g. 5c64f58/bug-181, which IS an ancestor of origin/main) + 2 WRONG single-candidate auto-backfills (bug-2, bug-100); re-run vs origin/main collapsed those to 2 + 0"
    status: closed-folded
    closure_mechanism: |
      Calibration #93 established that fix-SHA reconciliation must use
      git merge-base --is-ancestor against main (not substring/existence). This
      corollary: that check is only valid against a FRESH upstream main. Under the
      per-PR-branch model a worktree's local `main` ref is routinely stale (here 90
      commits behind), so the ancestry check returns false for shas that ARE on the
      real main — silently inverting every disposition that depends on it (false
      squash-traps) and emitting wrong apply-ready backfills. The discipline: git fetch
      + reconcile against the upstream tracking ref (origin/main), and treat any
      certainty derived from a possibly-stale ref as unsound (ground-truth-over-
      assumption, #85). Mechanical fix to scripts/reconciliation/reconcile.py
      (fetch-first / default --main to origin/<main> / warn-if-behind) tracked as
      bug-202.
    cross_refs:
      - "#93 (squash-sha reconciliation; the parent discipline)"
      - "#85 (reconcile-contradictory-docs-against-ground-truth-first)"
      - bug-202
      - scripts/reconciliation/reconcile.py
    tele_alignment:
      - tele-3
      - tele-2

# patterns[] — per-entry schema:
#   id                          string slug; stable kebab-case
#   title                       string; human-readable pattern name
#   origin                      string; "mission-X-WN" where pattern was first named
#   description                 string (multiline); pattern definition + diagnostic signature
#   surfaced_by_calibrations    list of calibration ids; non-empty
#   methodology_doc_subsection  string (optional); path + anchor to methodology-doc explanation
patterns:
  - id: methodology-bypass-becomes-substrate-defect-amplification-loop
    title: "Methodology-bypass-becomes-substrate-defect amplification loop"
    origin: mission-64-W4-followon
    description: |
      Architectural-pathology pattern. When a methodology-prescribed protocol (here:
      Option A thread for architect→engineer PR-review-request) is bypassed in favor
      of a "lighter-weight" alternative (here: kind=note), the bypass path can compose
      with substrate-level rendering + tool-surface gaps to produce silent
      actionable-content drop with bilateral blind-spot.

      Diagnostic signature (4 components):
      1. Architect-side believes the action succeeded — create_message returns clean
         messageId; no error feedback.
      2. Engineer-side sees content degrade silently — render-template doesn't know
         the payload shape; "(empty note body)" rendered.
      3. No return-path — engineer-side create_message is intentionally absent
         (authority-boundary role-filter); recipient cannot reciprocate even if
         rendering had succeeded.
      4. No round-trip detection mechanism — no Hub-side ack-or-nack signaling that
         lets architect-side discover the failure.

      Amplification: methodology-bypass + render-gap + no-return-path = silent
      actionable-content drop. None of the three components alone is a defect (each
      has legitimate non-bypass uses); their composition is the architectural
      pathology.

      Forward-discipline (3-component test for filing future calibrations):
      (1) Was a methodology-prescribed protocol bypassed?
      (2) Does the bypass path interact with a render-template-registry incompleteness
          or schema-validation gap?
      (3) Does the bypass path cross a tool-surface authority boundary that breaks
          return-path?
      If yes to all three → file as architectural-pathology class (single named
      calibration). Per-component yes → file as independent calibrations.
    surfaced_by_calibrations:
      - 41
    methodology_doc_subsection: "docs/methodology/multi-agent-pr-workflow.md#methodology-bypass-becomes-substrate-defect-amplification-loop"

  - id: two-sided-convergence-accounting
    title: "Two-sided convergence accounting (round-counting diplomatic phrasing)"
    origin: mission-64-W4-followon
    description: |
      Discipline pattern surfaced via mission-64 cleanup arc (thread-414 round 4 +
      thread-415 round 1). When bilateral close-of-thread events occur asymmetrically
      across architect + engineer rounds, narrative summaries should phrase round-count
      attribution diplomatically rather than crediting "the architect closed at round
      N" or "the engineer closed at round M" — both sides participate in convergence.

      Pattern: convergence is two-sided; the round-count framing should acknowledge
      bilateral close even when the structural commit is mechanically one-sided (e.g.,
      architect commits the converged=true flip after engineer round-N
      close-of-bilateral). Avoid round-counting language that implies one party "won"
      or "drove" closure when both parties signaled convergence.

      Mission-64 example: thread-411 round 4 engineer close-of-bilateral + round 5
      architect-side commit. Diplomatic phrasing: "thread-411 round 4 close-of-bilateral;
      round 5 architect-side commit." Avoids asymmetric "architect closed at round 5"
      framing.

      Lineage: mission-64 cleanup-arc review-loop surface; co-discovered with engineer
      in thread-415 round 4. Folded inline into mission-64 retrospective + bedded as
      durable architect feedback memory.
    surfaced_by_calibrations:
      - 46

  - id: review-loop-as-calibration-surface
    title: "Review-loop-as-calibration-surface"
    origin: mission-64-W4-followon
    description: |
      Pattern: review cycles for substantive PRs (audit / retrospective / cleanup /
      methodology-fold PRs) systematically surface methodology calibrations +
      sub-discipline refinements that didn't appear in the mission-execution phase.
      Test for them explicitly during PR review.

      Mission-64 cleanup arc (PRs #127 + #129 + #130) surfaced 4 review-loop
      refinements that the mission-execution phase never produced:
      - thread-414 round 2 → Calibration #42 NEW (post-event narration AEST/UTC date
        conflation)
      - thread-414 round 4 + thread-415 round 1 → "Two-sided convergence accounting"
        diplomatic phrasing pattern
      - thread-415 round 2 → Fresh-install settings.json rollback edge-case
        (sub-discipline of e2e rollback)
      - thread-415 round 2 → "Shallow-clones aren't a fallback case" doc-discipline
        (sub-discipline of #39 closure)

      Mission-65 extension (calibration #44): bilateral pre-alignment thoroughness in
      design-state ratify cycle correlates inversely with round-2 PR-review fold count
      — the pattern extends across review surfaces (design-state + PR-review).

      Recursive nugget: methodology calibrations can emerge from the review loop
      reviewing the same discipline class. Review-loops are calibration-surfacing
      surfaces, not just calibration-assessment surfaces.

      Forward-discipline:
      - During review of audit / retrospective / cleanup / methodology PRs, ask: "is
        the review surfacing calibration-class observations the PR doesn't capture?"
      - For substantive PRs (>100 lines doc or code-touching), expect 1-3 review-loop
        calibrations or sub-discipline refinements.
      - Bilaterally-aligned content (where author + reviewer pre-agreed via threads)
        often STILL surfaces ~2 review-cycle nits — these aren't gaps in
        pre-alignment; they're the review surface doing its job.
      - Capture review-loop calibrations as formal calibrations (not just nits) when
        they're durable methodology observations; sub-discipline refinements fold
        inline.
    surfaced_by_calibrations:
      - 42
      - 44
      - 46
      - 47

  - id: post-event-narration-aest-utc-discipline
    title: "Post-event narration AEST/UTC date conflation discipline"
    origin: mission-64-W4-followon
    description: |
      Authoring docs in AEST timezone (UTC+10) leads to timeline entries that mix AEST
      date with UTC `Z` suffix, producing dates ~1 day forward of actual UTC event
      time. Diagnostic signature: events that occurred 2026-04-28T22:13Z UTC (=
      2026-04-29T08:13 AEST) get authored as "2026-04-29 ~22:13Z" in retrospective
      doc — wrong UTC date with right Z-suffix discipline.

      Discipline (for post-event narration in docs/audits/, docs/reviews/,
      docs/decisions/):
      - Timeline tables use UTC consistently — Z-suffix attached only to UTC
        timestamps.
      - Never mix AEST calendar date with UTC time-of-day-suffix.
      - Acceptable alternatives when UTC-only is awkward:
        (a) explicit AEST qualifier with no Z (e.g., "2026-04-29 ~08:13 AEST")
        (b) parenthetical conversion ("2026-04-28T22:13Z UTC = 2026-04-29T08:13 AEST")
        (c) authoring-meta + event-meta separation (header "authored 2026-04-29 AEST";
            body "events 2026-04-28 UTC").

      Lineage: pre-existing project memory project_session_log_timezone.md notes the
      same skew applies to work-trace entries (~10h forward AEST vs UTC). Calibration
      #42 surfaces the discipline applies broadly to post-event docs, not just
      work-traces. Mission-64 retrospective is the canonical fixup example: UTC-
      consistency restored across §2 timeline + §3 commitments + Closing § via fixup
      commit pre-merge.
    surfaced_by_calibrations:
      - 42
    methodology_doc_subsection: "docs/methodology/multi-agent-pr-workflow.md#post-event-narration-aest-utc-date-conflation-discipline"

  - id: deferred-divergence-becomes-drift
    title: "Deferred divergence becomes drift"
    origin: mission-95-design
    description: |
      Architectural-pathology pattern. Inside a consolidation / refactor /
      multi-host arc, deferring the closure of a KNOWN asymmetry or divergence
      ("we'll fold it later") on scope-minimization grounds plants a future
      drift surface — the un-propagated change drifts across hosts/components.
      This is the M18-scar class generalized (a fix landing in one shim/host
      and not propagated drifts; idea-355 exists to undo exactly this).

      Diagnostic signature:
      1. A consolidation arc surfaces a bounded adjacent asymmetry/divergence.
      2. It is recommended for DEFER on scope-min ("keep the mission small"),
         often framed as more expensive than it is (a "migration" that is
         actually a delete once adjacent work lands).
      3. Deferring leaves a live divergence surface = the next drift incident.

      Counter-discipline: default to closing a bounded divergence NOW
      ("clean symmetry"); pressure-test the real cost first; defer only on a
      genuine scope/risk blowup.
    surfaced_by_calibrations:
      - 86

  - id: cross-lineage-cutover-without-runtime-acceptance-gate
    title: "Cross-lineage cutover without a runtime acceptance gate"
    origin: mission-92
    description: |
      Architectural-pathology pattern. An adapter/shim mission optimised for STRUCTURAL
      metrics (line-count, delegation-to-core) ships a distribution bundle that a
      CROSS-LINEAGE consumer runs (different model + harness — e.g. the
      @apnex/opencode-hub-plugin bundle a GPT-5.5/OpenCode peer consumes), but the
      mission's test process is confined to its own subsystem + a SAME-LINEAGE harness.
      Behavioural-contract defects against the consumer's real runtime — and the
      cross-membrane interactions the consumer triggers — stay invisible until the
      consumer cuts over live. A green same-lineage suite is NOT a completeness signal
      for a cross-lineage deliverable.

      Diagnostic signature:
      1. The deliverable is a bundle/artifact a cross-lineage peer (other model/harness)
         runs, not just the authoring lineage.
      2. Success was graded on a structural/code metric (line-count, delegation,
         "N/N tests green") rather than behavioural-contract fidelity against the
         consumer's real runtime.
      3. The passing suite is the AUTHORING lineage's (here: the Claude suite); the
         consumer's runtime (OpenCode/Bun) is exercised by no test.
      4. Defects surface only at live cutover (here: bug-161 dead queue-gate; the
         verifier participation/identity cluster — bug-164/bug-165 + thread-reply +
         the role-change boundary).

      Forward-discipline: any adapter-only mission shipping a bundle a cross-lineage
      peer consumes REQUIRES a system-level (hub + adapter + real-runtime) acceptance
      gate proving the handshake / surfacing / participation / read invariants against
      the consumer's real runtime BEFORE the consumer cuts over (the R3 Cross-Lineage
      Runtime Acceptance Gate). Same-lineage suite-green gates regressions; it does not
      satisfy this gate.
    surfaced_by_calibrations:
      - 95
    methodology_doc_subsection: "docs/specs/cross-lineage-runtime-acceptance-gate.md"
