      instance of a broader axiom — GROUND-TRUTH-OVER-ASSUMPTION: verify from
      code/prod, not from narrative or a carried mental model, before relying
      on state. Surfaced across FOUR surfaces this stint:
      (1) LEDGER — reconcile-first; the bug ledger was ~52% stale and seeding /
          strategic-review ran on stale data (near-miss 3-4x duplicate rebuild).
      (2) DEPLOY — /health before declaring a blocker; a phantom
