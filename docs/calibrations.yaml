  - id: 66
    class: methodology
    title: "Director-bridged-engineer-approval — substrate-comms-outage fallback discipline (PR-approval relay during bilateral-thread-comms breakdown)"
    origin: post-bug-56-thread-485-P0-cycle
    surfaced_at: PR #185 + PR #184 cross-approval during bug-56 outage (2026-05-06)
    status: open
    closure_mechanism: |
