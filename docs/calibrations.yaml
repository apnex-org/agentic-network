  - id: 91
    class: substrate
    title: "REDEPLOY does not invalidate a running host's tool-surface cache — a tool-catalog change shipped via redeploy leaves an already-running host advertising the stale on-disk cache; /reload-plugins reuses the same proxy and is insufficient, only cache-delete + FULL restart recovers"
    origin: autonomous-stint-3 (bug-180)
    surfaced_at: autonomous-stint-3 2026-06-27 — bug-180; after the #361 onramp deploy added the 11 C1 work-queue verbs, both claude-plugin proxies kept advertising the stale catalog and blocked the C1 dogfood go-live; peer-verified (greg thread-712 + steve thread-713)
    status: open
    closure_mechanism: |
      Pattern signature: a surface / tool-catalog change delivered via REDEPLOY
      does NOT invalidate an already-running host's on-disk cache
      ($WORK_DIR/.ois/tool-catalog.json, trusted-stale-on-unknown-revision).
      /reload-plugins reconnects the SAME proxy process and is empirically
      insufficient; only cache-delete + a FULL client restart per worktree
      recovers. Blocked the C1 dogfood go-live this stint.

      Structural fix: block the first ListTools on a /health revision check OR
      emit notifications/tools/list_changed on revision-drift (kernel
      ToolSurfaceReconciler, #362, shipped). Single-home consolidation
      (mission-95) is the structural kill for the adjacent stale-kernel family
      (bug-182/183/186). OPEN until the reconciler invalidation path is the
      default and the manual cache-delete + restart recipe is retired.

      RECURRENCE (autonomous-stint-4, bug-199): RECURRED one stint after the
      structural fix MERGED — as a NEW FACET. bug-180's primary evidence was a
      whole stale VERB-SET (68->83 tools); bug-199 is the SCHEMA-GRANULARITY
      facet: a new FIELD (update_bug `repo`, get_backlog_health) on the live
      surface, invisible to the architect's running session whose on-disk
      catalog held the pre-#402 per-tool inputSchema. Precision (ground-truthed
      at stint-4 close): the #362/ade10cf structural fix is MERGED but
      smoke-PENDING (bug-180 status=investigating, work-5 AC1 unrun) — so this
      is "fix-merged-but-not-yet-verified AND already recurred as a new facet,"
      NOT "fix shipped but recurred." The recurrence-after-merge is the
      strongest signal the invalidation path is not yet the DEFAULT. Engineer
      seat (greg) named it the sharpest engineer friction: "I ship a verb I
      then can't call from the seat that built it." Rider: extend the work-5
      AC1 smoke to assert schema-level refresh (a changed inputSchema on an
      existing tool propagates), not only new-verb appearance. tele-5
