  - id: 86
    class: methodology
    title: "Deferred divergence becomes drift — close a bounded asymmetry NOW ('clean symmetry') over deferring as a follow-on"
    origin: mission-95-design
    surfaced_at: thread-729-round4
    status: closed-folded
    closure_mechanism: |
      idea-355 SLICE-1T (converge the opencode shim's bespoke tool-surface
      sync onto the shared kernel ToolSurfaceReconciler). The architect
      recommended DEFER — treat it as a parity-not-dedup follow-on to "keep
      MEDIUM" — over-estimating it as a from-scratch behavioral migration.
      Director steered "fold slice — clean symmetry" (override). greg's
      construction refinement then showed it was a cheap DELETE, not a
      migration: SLICE-1's kernel-driven live-refresh + SLICE-2's redeploy
      hand opencode the kernel reconciler path for free, so the bespoke
      computeToolHash+syncTools is simply removed (delete-in-bundle).

      Pattern signature: inside a consolidation/refactor/multi-host arc, a
      KNOWN asymmetry/divergence is deferred ("fold it later") on
      scope-minimization grounds; the deferral plants a future drift surface —
      the same pathology class the arc itself is fixing (the M18 scar: a fix
      landing in one host/shim drifts because it was not propagated).

      Discipline: default to closing a BOUNDED divergence now; pressure-test
      the REAL cost before deferring (frequently cheap once adjacent work
      lands — the "migration" was a delete); reserve defer for genuine
      scope/risk blowups (e.g. routing ALL emits through message-router → L),
      not minimalism-vs-tidiness. Counter-bias to the architect's reflexive
      scope-minimization. Codified in feedback memories
      feedback_close_divergence_over_defer + feedback_capture_valuable_steers.
      First calibration architect-filed under the relaxed filing model
      (Director-curates-not-gates; see CLAUDE.md Calibration ledger discipline
      + this PR).
