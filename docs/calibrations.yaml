      internal-call-pattern defects + DEFECTS-IN-THE-CALLER) at a different layer:
      SDK-direct tests cover the SDK methods in isolation but DON'T exercise the
      daemon-watcher dispatch path that routes Loop-B-tick-firing through helpers
      like `detectDaemonMode`. The dispatch-layer is the integration-test gap.

      Diagnostic signature: a wave's SDK-level transparency-gate test (per calibration
      #72 SHAPE-assertion discipline) passes despite the daemon-dispatch path having
      a substrate-defect that breaks production-side end-to-end. The defect lurks
      because tests drive the SDK methods directly (e.g. `Missioncraft.readerLoopBV5
      Tick(missionId)`) without going FROM the daemon-watcher entry-point.

      Application instance: mission-78 W4-new slice (vii) transparency-gate test
      (v1.2.0-w4-new-writer-reader-bilateral-e2e.test.ts) passed at 0db1601. But
      Fix #10 BLOCKER (daemon's reader-mode-detection path used wrong config-path,
      missing `missions/` subdir per v1.0.5 idea-271 layout) was LATENT: daemon's
      `existsSync(configPath)` returned false → silent catch → defaulted to writer-
      mode → entire reader-mode substrate functionally DEAD via daemon path. Slice
      (vii) tests didn't exercise the dispatch path so the defect didn't surface.
      Architect-side dogfood at thread-547 round 7 caught it via real-daemon spawn
      against apnex/missioncraft-sandbox real upstream.

      Resolution: Fix #10 (daemon canonical missionConfigPath layout via daemon-
      mode-detect.ts module extraction) + Fix #11 (8 SHAPE-assertion tests at the
      dispatch-layer including pre-Fix-#10 regression net: synthetic config at
      broken path INVISIBLE). Discipline-fold: substrate-extension waves that
