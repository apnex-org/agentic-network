  - id: 80
    class: substrate
    title: "FILTER-vs-DECODE dual-surface of envelope-blindness — closing the filter-translation path is NOT closing the read-decode path; the silent-failure class spans both, and filter-parity (count) checks pass while returned entities are still raw envelope"
    origin: mission-90
    surfaced_at: mission-90 retrospective §3.2 2026-06-20 — bug-138 was conceived as filter-translation (W2/W3 fixed it there) but the returned-entity read path (a consumer reading a top-level field off a raw envelope row gets undefined or a phase-object) hid for the whole mission because filter-parity counts matched while the entities were unrendered
    status: closed-structurally
    closure_mechanism: |
      Pattern signature: an envelope/encoding boundary has TWO read surfaces —
      the query/filter path (does the row match?) and the returned-entity
      path (does a consumer reading a relocated field get the value?).
      Fixing the filter half leaves the decode half silently broken;
      count-based filter-parity checks give false assurance because counts
      match while returned bodies are raw. Structural close: decode-to-flat
      at the repo read + CAS membrane (renameMap-derived decodeEnvelopeToFlat
      + bespoke leaf-rename decoders) makes every read path return one flat
      shape. bug-138 eliminated across BOTH surfaces.
      Folded into retro §3.2; CLAUDE.md envelope-substrate STRICT +
      decode-to-flat section.

      EXTENSION (autonomous-stint-3, bug-188): the dual-surface is actually a
      TRI-SURFACE — sort/ordering is a THIRD envelope read-path surface
      alongside filter + decode. Same envelope-blindness class, new surface:
      bug-188 (listThreads ordered/limited at the storage layer dropped the
      newest rows because the ORDER BY operated on an envelope column, not the
      decoded flat field — an unordered LIMIT 500 silently truncated newest
      rows). filter + decode + SORT are ALL envelope read-path surfaces that
      must derive from the same renameMap. The ORDER BY updatedAt band-aid
      (bug-177-OBS1) must NOT be mistaken for class-closure — the class closes
      only when sort, like filter and decode, is renameMap-derived across every
      kind. surfaced_at bug-177 -> bug-188 (DR-S3-012/013); tele-1 + tele-7.
    closure_pr: 324
    cross_refs:
      - mission-90 (M-Envelope-Substrate-Completion)
      - bug-138 (the dual-surface silent-failure class)
      - bug-158 (list_missions envelope-blindness; filter-side residual exposed by the strict cutover)
      - bug-188 (listThreads unordered LIMIT 500 drops newest rows; the SORT/ordering third surface — autonomous-stint-3)
      - bug-177 (OBS1 ORDER BY updatedAt band-aid; NOT class-closure)
      - docs/decisions/autonomous-stint-3-2026-06-27-log.md (DR-S3-012/013 tri-surface extension)
      - docs/reviews/m-envelope-substrate-completion-retrospective.md §3.2
