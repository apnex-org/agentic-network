  - id: 79
    class: methodology
    title: "FALSE-GREEN-AT-SCALE via unfaithful test fixtures — a test substrate that stores a non-production shape exercises a passthrough that never runs the real decode, masking the exact bug class it sits on"
    origin: mission-90
    surfaced_at: mission-90 W8 retrospective §3.3 2026-06-20 — the faithful-harness migration (setWriteEncoder in the harnesses + memory factory default) flipped the suite green-but-lying to red-and-honest (193 failures), surfacing a class of silently-degraded live production state-machine defects (review circuit-breaker, mission auto-advance, proposal-close, PendingAction watchdog, message-sequencing) invisible since the original envelope migration
    status: closed-folded
    closure_mechanism: |
      Pattern signature: a test fixture seeds entities in a shape the
      production substrate does NOT store (here: legacy-flat fixtures while
      prod stores K8s-envelope). The suite then exercises a flat->flat
      passthrough and never runs the real envelope-decode path, so CI is
      green while the decode is broken. Compounds with a silent-degrade
      try/catch in prod (see #84): the same defect is invisible to BOTH the
      test suite AND prod monitoring — false-green at scale.
      Diagnostic: does the test substrate store the SAME shape production
      stores? If not, every green is suspect for shape-sensitive logic.
      Fix that exposed it: harness fidelity (see #82). Durable mitigation:
      fail-loud / anomaly-monitor over silent-degrade (see #84).
      Folded into retro §2.2 + §3.3; mission-scale manifestation of RETIRED
      #19 (schema-rename without state migration).

      RECURRENCE (autonomous-stint-3): the false-green / faithful-harness class
      RECURRED one stint after naming — bug-178 (~42 testcontainer files used a
      raw `new Pool` instead of the shared faithful fixture) + PR #385 where a
      mock harness GREEN-LIT two real-pg-only seams (a non-monotonic cursor +
      an iterator-settle hang) caught only by steve's real-pg probing
      (#385 9a7d552). A named pattern recurring AFTER naming is the strongest
      argument to MECHANIZE it into a guard — ties to #88 (re-introduction-
      guard scan-scope) + idea-356 (calibration write-verb/validate +
      auto-surface). tele-8 + tele-7.

      GENERALIZATION (autonomous-stint-4, idea-378 / #403): the false-green
      class extends beyond TEST-fixture shape to PRODUCTION-INPUT shape. A
      data-processing / reconciliation tool that validates only that its
      MECHANISM executes — without validating against the REAL production INPUT
      shape — false-greens the same way a non-faithful harness does. #403's
      reconcile.py executed cleanly but mis-classified envelope rows
      (resolved->open) because it read the storage shape, not the decoded-flat
      shape (verifier catch #2 — the CLI built to FIX the stale ledger would
      have silently mis-curated it). Discipline: "faithful-to-input-SHAPE" —
      any production-data-processing tool is validated against a sample of the
      REAL production input, not a synthetic/assumed shape. See idea-378.
    closure_pr: 324
    cross_refs:
      - mission-90 (M-Envelope-Substrate-Completion; status=completed 2026-06-20)
      - idea-378 (faithful-to-input-shape; the production-data-processing generalization — autonomous-stint-4)
