      - tele-7

  - id: 81
    class: methodology
    title: "PREMATURE structural-closure claim from partial verification — claiming a defect CLASS is eliminated from a verified SUBSET; structural-elimination requires full-surface verification (every kind, every read path, every consumer), not extrapolation"
    origin: mission-90
    surfaced_at: mission-90 retrospective §3.1 2026-06-20 — bug-138-fully-closed was claimed THREE times (after the W6 filter-side cutover; after bug-158 closed 8/9 filter tools; each before the read-side decode was closed), each extrapolating closure from a verified subset; the corrections came from greg validation + the deep audit, not from architect assertion
    status: closed-folded
    closure_mechanism: |
      Pattern signature: a class-X-eliminated claim is extrapolated from a
      verified subset (some kinds / one read path / the filter half). The
      gap between subset-verified and full-surface is exactly where the
      class survives. Discipline: a structural-elimination claim is a BINARY
      full-surface certification — enumerate every kind, every read path,
      every consumer, and verify each, before the claim ships. Treat
      partial-verification as PARTIAL, never as structural.
