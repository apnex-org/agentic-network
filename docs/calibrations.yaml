      the stored shape, the highest-leverage first move is to make the test
      substrate store the SAME shape production stores. A faithful harness
      converts shape-sensitive defects from invisible (green-but-lying) to
      visible (red-and-honest). A harness that stores a different shape than
      production is a false-green generator (#79).
