      - "#88 (re-introduction-guard scan-scope; the mechanization target for this recurring class)"
      - bug-138 (envelope-blind reads; the masked defect class)
      - bug-178 (~42 testcontainer raw-Pool files; the recurrence — autonomous-stint-3)
