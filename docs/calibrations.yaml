  - id: 89
    class: methodology
    title: "NEVER bypass the ship-path gate — the CI-green + up-to-date + version-assert gate is never bypassed to unstick a mismatch; fix the ordering/state instead (parent axiom that #87 + the no-admin backplane deploy-train both instantiate)"
    origin: autonomous-stint-3 (deploy-train + version-gate-3x)
    surfaced_at: autonomous-stint-3 2026-06-27 — DR-S3-013 (7-PR backplane merge-train landed CI-gated, riskiest PR last, no --admin) + DR-S3-007 + the cal #87 version-gate-3x corollary; the gate fired correctly under pressure all stint and was never bypassed
    status: open
    closure_mechanism: |
      Pattern signature: a ship-path gate (CI-green + branch up-to-date +
      version-assert) blocks a merge/publish on a transient mismatch, and the
      tempting "fix" is to bypass it (--admin merge, skip the assert) to
      unstick the pipeline. Bypassing converts a loud, correct gate into a
      silent integrity hole.

      Discipline: the ship-path gate is NEVER bypassed to unstick a mismatch —
      fix the ordering/state that tripped it instead (rebase to up-to-date,
      co-commit the version bump, wait for green). This is the PARENT axiom
      that #87 (version-bump co-commits with the FINAL src PR) and the
      backplane deploy-train (CI-gated, riskiest-last, no --admin) both
      instantiate. Held under pressure all stint: the version-gate fired 3x
      and was never bypassed; the 7-PR backplane batch landed via a CI-gated
      merge-train with the riskiest PR last and no --admin.
      OPEN until folded into the ship/release discipline
      (multi-agent-pr-workflow.md ship-path subsection).
