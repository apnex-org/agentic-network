  - id: 65
    class: methodology
    title: "Gate-narrowness-vs-boundary-breadth — bypass predicates / filters / matchLabels that enumerate instances of a concept fail when new instances are added; gates should match concept boundary not specific instances (2 canonical instances; sibling-direction enrichment 2026-05-08-evening)"
    origin: post-mission-225-bug-55-cycle
    surfaced_at: bug-55 substrate-investigation thread-486 (2026-05-06; gate-too-narrow direction); bug-58 cross-user broadcast tenant-isolation thread-505 (2026-05-08-evening; gate-too-broad direction; sibling-direction enrichment)
    status: open
    closure_mechanism: |
      Architectural-pathology meta-pattern. When a runtime gate (bypass predicate,
      filter, allowlist) is implemented as an enumerated set of specific instances
      of a broader concept, the gate fails silently when new instances of the
      concept are added without remembering to update the enumeration. **Sibling-
      direction enrichment 2026-05-08-evening**: pattern has TWO failure-mode
      directions, both empirically observed:
      - **Gate-too-narrow** (bug-55) — enumeration covers FEWER instances than
        the conceptual boundary; new instances LEAK PAST the gate (gate too
        permissive at the boundary)
      - **Gate-too-broad** (bug-58) — copy-everything covers MORE instances than
        the conceptual boundary; legitimate cross-instance dispatch FILTERS
        OUT (gate too restrictive at the boundary)
      Both failure-modes pass the same diagnostic test: "is this gate matching
      the conceptual boundary, or enumerating-vs-blanket-copying instances of
      a broader/narrower concept?" The fix in both directions is concept-
      boundary-matching (vs instance-enumeration OR blanket-copy).

      Bug-55 = textbook gate-too-narrow instance:
      - mission-225 §3.3 design correctly identified the broad boundary: cognitive
        presence (LLM-meaningful-work) vs transport presence (adapter-housekeeping)
      - Implementation pinned the runtime gate to a single tool-name allowlist:
        AGENT_TOUCH_BYPASS_TOOLS = new Set(["transport_heartbeat"])
      - shouldBypassTouchAgent predicate matched ONE specific tool name where the
        conceptual boundary was broad
      - Wire-level `tools/list` heartbeats fell outside the gate (correctly
        identified as adapter-housekeeping conceptually; not in the enumeration)
      - Operator-visible only via TTL-drift symptom — silent until idea-220 Phase
        2 (TTL projection live-compute on read, bug-54) made lastSeenAt-vs-
        lastHeartbeatAt divergence operator-visible per second

      Bug-55 fix (PR #183) corrected by inverting the gate to tier-based positive-
      list: shouldTouchAgent returns true ONLY for tools/call to tier:"llm-
      callable" tools. Default-deny semantic matches the concept boundary. New
      additions to either tier auto-classify correctly.

      Bug-58 = textbook gate-too-broad instance (sibling-direction enrichment
      2026-05-08-evening):
      - Director observation 2026-05-08: "I'm not sure 'all tags' should be
        copied and filtered against — this is a gap" + Director-directive "I
        think only 'env:' labels were supposed to be assumed/copied"
      - Broadcast/multicast openSelector derivation at `hub/src/policy/thread-
        policy.ts:163,182,239` auto-copies ALL creator labels (including
        identity-class `ois.io/github/login`) into matchLabels filter
      - Conceptual boundary: scope-class labels (env, namespace, deployment-
        tier — appropriate cross-pool isolation) vs identity-class labels
        (per-user logins, agent-instance-IDs — describe individual agents
        within a deployment-scope, NOT pool boundaries)
      - Implementation pinned the runtime gate to copy-everything (treats all
        labels as scope-class)
      - Cross-user pool resolves 0 members silently — `apnex-lily` architect's
        broadcast filtered by `ois.io/github/login: apnex-lily` matchLabel,
        excluding `apnex-greg` engineer who shares `env: prod` but has
        different login

      Bug-58 fix (PR #201) corrected by introducing scopeLabels() helper at
      `hub/src/policy/labels.ts` with hardcoded `SCOPE_LABEL_KEYS = ["env"]`;
      applied at thread-policy.ts:239 openSelector derivation as single change
      point preserving Mission-19 INV-TH9 thread.labels archival inheritance
      unchanged. Mission-19/labels.test.ts updated to assert env-only contract
      — codifies the bug-58-correct behavior + closes calibration #62 9th-
      instance via "tests asserting selector/matchLabels behavior must validate
      against conceptual delivery contract not current implementation behavior"
      audit-rubric refinement.

      Diagnostic signature for future bypass/filter/match-label design: "is
      this gate matching the conceptual boundary, OR enumerating-vs-blanket-
      copying instances of a broader/narrower concept?" If enumerating (gate-
      too-narrow direction) OR blanket-copying (gate-too-broad direction):
      design is fragile to boundary-misalignment; concept-boundary matching
      is the structural fix in both directions.

      Generalization: pattern applies to any mechanism that gates behavior based
      on category membership (allowlists, denylists, tier filters, tag-based
      routing, matchLabels, etc.) in EITHER direction. Whenever the gate's
      literal-text doesn't match the conceptual category — too narrow OR too
      broad — boundary-misalignment defects surface silently.

      Tele alignment:
      - tele-6 (Deterministic Invincibility) — concept-matching gates remain
        correct as new instances are added; instance-enumeration gates drift
      - tele-3 (Sovereign Composition) — gate-as-concept = single source of
        truth for the boundary; gate-as-list = drift-prone

      Closure path:
      (a) PROCEDURAL — diagnostic test in feedback memory: when designing a
        bypass/filter/allowlist, ask "does this gate match the conceptual
        boundary or enumerate specific instances?" If enumerate, surface as
        review-time concern.
      (b) STRUCTURAL — at Phase 4 Design audit-rubric, add the diagnostic
        question. Same as #62 (b)/(c) — both compose into Phase 4 audit-rubric
        promotion.

      Composes-with #62 (deferred-runtime-gate-becomes-silent-defect-surface) —
      #65 is the structural-cause class; #62 is the discovery-channel class.
      Together: gate-narrowness produces silent defects → deferred runtime gates
      don't catch them → operator-discovers-via-prod-audit pattern.

      Architect-Director ratification: Director directive 2026-05-06 "Confirmed.
      Approved" post bug-55 closure (gate-too-narrow direction); Director
      directive 2026-05-08-evening "I'm not sure 'all tags' should be copied
      and filtered against — this is a gap" + "I think only 'env:' labels
      were supposed to be assumed/copied" (gate-too-broad direction; sibling-
      direction enrichment); Director directive 2026-05-08-evening "File
      updates" (this 2-instance ledger update).
    pattern_membership:
      - methodology-bypass-becomes-substrate-defect-amplification-loop
    cross_refs:
      - bug-55 (1st canonical instance; gate-too-narrow direction; resolved via PR #183 commit 1464a11a)
      - bug-58 (2nd canonical instance; gate-too-broad direction; resolved via PR #201 commit bde23209)
